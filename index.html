<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>miDash</title>
<meta name="description" content="Q's personal command center — calendar, mail, projects, and play in one place." />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>" />
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg:#fafaf9; --surface:#fff; --border:#ececea; --text:#1a1a18; --muted:#76746e;
    --accent:#2d6a4f; --accent-soft:#e7f0eb; --warn:#b4541f;
    --shadow:0 1px 2px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.04); --radius:16px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#141413; --surface:#1e1e1c; --border:#2c2c29; --text:#f0efec; --muted:#9a978f;
      --accent:#74c69d; --accent-soft:#1f2e27; --warn:#e0915f;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.25);
    }
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;
         background:var(--bg); color:var(--text); line-height:1.5; -webkit-font-smoothing:antialiased; padding:0 24px 120px; }
  .wrap { max-width:1400px; margin:0 auto; }

  header { padding:48px 0 28px; display:flex; align-items:flex-end; justify-content:space-between; gap:16px; flex-wrap:wrap; }
  .greeting { font-size:32px; font-weight:600; letter-spacing:-.02em; }
  .sub { color:var(--muted); font-size:15px; margin-top:6px; }
  #clock { font-variant-numeric:tabular-nums; }
  .gbtn { border:1px solid var(--border); background:var(--surface); color:var(--text);
          border-radius:10px; padding:9px 14px; font-size:14px; font-weight:500; cursor:pointer; display:flex; gap:8px; align-items:center; }
  .gbtn:hover { background:var(--accent-soft); }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
          padding:20px 22px 22px; box-shadow:var(--shadow); }
  .card.wide { grid-column:1/-1; }

  /* top menu — one collapsed row; categories open as floating dropdowns on hover */
  #layout .main { min-width:0; }
  .topmenu { padding:8px 14px; }
  .menu-bar { display:flex; align-items:center; gap:10px; }
  .menu-items { display:flex; align-items:center; gap:2px; flex-wrap:wrap; flex:1; }
  .side-sec { position:relative; }
  .side-sec > h2 { margin:0; padding:8px 12px; border-radius:10px; cursor:default;
                   font-size:13px; font-weight:600; letter-spacing:.02em; text-transform:none;
                   color:var(--text); display:flex; align-items:center; gap:7px; white-space:nowrap; }
  .side-sec:hover > h2 { background:var(--accent-soft); color:var(--accent); }
  .side-sec > h2 .dot { font-size:15px; }
  .side-sec > h2 .refresh { margin-left:6px; font-size:12px; color:var(--muted); cursor:pointer; }
  .side-sec > h2 .refresh:hover { color:var(--accent); }
  /* dropdown panel — absolute so it overlays content instead of pushing it */
  .side-sec .links { position:absolute; top:100%; left:0; min-width:220px; z-index:60;
                     background:var(--surface); border:1px solid var(--border); border-radius:12px;
                     box-shadow:var(--shadow); padding:8px; display:none; flex-direction:column; }
  .side-sec:hover .links { display:flex; }
  .side-sec .links a { font-size:14px; padding:8px 10px; }
  #contacts { max-height:60vh; overflow-y:auto; }
  @media (max-width:560px){ .side-sec .links { left:auto; right:0; } }
  .card h2 { font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:.06em;
             color:var(--muted); display:flex; align-items:center; gap:8px; margin-bottom:16px; }
  .card h2 .dot { font-size:16px; }
  .card h2 .refresh { margin-left:auto; font-size:12px; color:var(--muted); cursor:pointer; text-transform:none; letter-spacing:0; }
  .card h2 .refresh:hover { color:var(--accent); }

  .links { display:flex; flex-direction:column; gap:2px; }
  .links a { display:flex; align-items:center; justify-content:space-between; padding:9px 12px; margin:0 -12px;
             border-radius:10px; color:var(--text); text-decoration:none; font-size:15px; transition:background .12s; }
  .links a:hover { background:var(--accent-soft); }
  .links a .meta { color:var(--muted); font-size:13px; }
  .links a .arrow { color:var(--muted); opacity:0; transition:opacity .12s; }
  .links a:hover .arrow { opacity:1; }

  /* Today panel */
  .today { display:grid; grid-template-columns:1fr 1fr; gap:28px; }
  @media (max-width:640px){ .today { grid-template-columns:1fr; } }
  .col h3 { font-size:13px; font-weight:600; color:var(--muted); margin-bottom:10px; display:flex; align-items:center; gap:6px; }
  .item { padding:8px 0; border-bottom:1px solid var(--border); font-size:14px; }
  .item:last-child { border-bottom:none; }
  .item .t { color:var(--accent); font-variant-numeric:tabular-nums; font-weight:600; font-size:13px; }
  .item .s { display:block; }
  .item .from { color:var(--muted); font-size:12.5px; }
  .pill { display:inline-block; font-size:11px; padding:2px 8px; border-radius:20px; background:var(--accent-soft); color:var(--accent); margin-left:6px; }
  .empty { color:var(--muted); font-size:14px; padding:6px 0; }
  .att { display:inline-block; font-size:12px; color:var(--muted); margin-top:3px; }
  .mailrow .age { color:var(--muted); font-size:11.5px; font-variant-numeric:tabular-nums; }
  .needsauth { color:var(--muted); font-size:14px; }
  .needsauth button { margin-top:10px; }

  /* refresh spin */
  .refresh .ricon { display:inline-block; }
  .refresh.spin .ricon { animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* link health dots */
  .ldot { width:7px; height:7px; border-radius:50%; background:#c9c7c1; flex:0 0 auto; margin-right:9px; }
  .ldot.up { background:#3aa66f; } .ldot.down { background:#d1453b; } .ldot.set { background:#c9c7c1; }
  .links a .lhs { display:flex; align-items:center; min-width:0; }

  /* account chips */
  .chip { display:inline-flex; align-items:center; gap:7px; font-size:13px; padding:5px 11px;
          border-radius:20px; background:var(--surface); border:1px solid var(--border); color:var(--text); }
  .chip b { font-weight:600; }
  .chip .email { color:var(--muted); font-size:12px; }
  .chip .x { cursor:pointer; opacity:.5; font-size:12px; } .chip .x:hover { opacity:1; }
  /* mail label pills */
  .lbl { display:inline-block; font-size:10.5px; padding:1px 7px; border-radius:20px; border:1px solid var(--border); color:var(--muted); margin:2px 4px 0 0; vertical-align:middle; }

  /* account ID pill (used throughout) */
  .idpill { display:inline-flex; align-items:center; gap:5px; font-size:10.5px; font-weight:600;
            padding:1px 8px 1px 6px; border-radius:20px; vertical-align:middle; margin-left:6px;
            color:var(--p,var(--accent)); background:color-mix(in srgb,var(--p,var(--accent)) 14%,transparent); }
  .idpill::before { content:""; width:6px; height:6px; border-radius:50%; background:var(--p,var(--accent)); }

  /* live data rows — calendar + mail */
  .row { display:block; padding:9px 10px; margin:0 -10px; border-radius:10px; text-decoration:none; color:var(--text);
         transition:background .12s; border-bottom:1px solid var(--border); }
  .row:last-child { border-bottom:none; }
  a.row:hover { background:color-mix(in srgb, var(--p,var(--accent)) 14%, var(--surface)); }
  .ev { display:grid; grid-template-columns:70px 1fr; gap:10px; align-items:baseline; }
  .ev .t { color:var(--accent); font-variant-numeric:tabular-nums; font-weight:600; font-size:12.5px; }
  .ev .s, .mailrow .s { font-size:14px; }
  .mailrow .from { color:var(--muted); font-size:12.5px; margin-top:2px; display:block; }
  .row.past { opacity:.42; }
  .row.past .s { text-decoration:line-through; }
  .dayhead { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em;
             color:var(--muted); margin:16px 0 6px; padding-bottom:4px; border-bottom:1px solid var(--border); }
  .dayhead:first-child { margin-top:2px; }
  .dayhead.today { color:var(--accent); }

  /* Google-style agenda view */
  #agenda-view { margin-top:2px; }
  .agrow { display:grid; grid-template-columns:80px 12px 104px 1fr; align-items:baseline; gap:10px;
           padding:11px 8px; margin:0 -8px; border-radius:10px; border-top:1px solid var(--border);
           text-decoration:none; color:var(--text); transition:background .12s; }
  .agrow:first-child { border-top:none; }
  a.agrow:hover { background:color-mix(in srgb, var(--p,var(--accent)) 14%, var(--surface)); }
  .agdate { display:flex; align-items:baseline; gap:8px; }
  .agdnum { font-size:20px; font-weight:600; letter-spacing:-.02em; }
  .agdlab { font-size:11px; font-weight:600; letter-spacing:.04em; color:var(--muted); }
  .agdot { width:11px; height:11px; border-radius:50%; background:var(--p,var(--accent)); align-self:center; }
  .agtime { font-size:13.5px; color:var(--muted); font-variant-numeric:tabular-nums; }
  .agtitle { font-size:15px; font-weight:500; }
  .agloc { color:var(--muted); font-weight:400; font-size:13.5px; margin-left:8px; }
  .agrow.past { opacity:.42; } .agrow.past .agtitle { text-decoration:line-through; }
  .agfoot { margin-top:14px; padding-top:12px; border-top:1px solid var(--border); font-size:13px; color:var(--muted); }
  .agfoot a { color:var(--accent); text-decoration:none; } .agfoot a:hover { text-decoration:underline; }
  @media (max-width:560px){ .agrow { grid-template-columns:74px 12px 1fr; } .agrow .agtime { grid-column:3; } }

  /* agenda + notes row (notes gets the bigger share), stretched so heights match */
  .split { display:grid; grid-template-columns:1fr; gap:20px; align-items:stretch; }
  .split.live { grid-template-columns:3fr 2fr; }
  @media (max-width:760px){ .split.live { grid-template-columns:1fr; } }
  .split > * { min-width:0; }        /* let the fr tracks win — don't let long URLs blow out a column */
  #notes { display:flex; flex-direction:column; }
  #notes-area { flex:1; }

  /* keep long unbreakable URLs/titles from forcing columns wide */
  .main { min-width:0; }
  .agtitle, .agloc, .agrow .agtitle, .mailrow .s, .ev .s { overflow-wrap:anywhere; word-break:break-word; min-width:0; }
  .agrow, .mailrow, .ev { min-width:0; }

  /* editable account color swatch (native color input styled as a dot) */
  input.cdot { -webkit-appearance:none; -moz-appearance:none; appearance:none; width:16px; height:16px; padding:0;
    border:1px solid rgba(0,0,0,.15); border-radius:50%; background:var(--p,var(--accent)); cursor:pointer; flex:0 0 auto; }
  input.cdot::-webkit-color-swatch-wrapper { padding:0; }
  input.cdot::-webkit-color-swatch { border:none; border-radius:50%; }
  input.cdot::-moz-color-swatch { border:none; border-radius:50%; }

  /* version stamp */
  .ver { font-weight:700; color:var(--text); }
  .ver .vchg { color:var(--accent); }

  /* pager */
  .pager { display:flex; align-items:center; gap:10px; margin-top:12px; font-size:13px; color:var(--muted); }
  .pager button { border:1px solid var(--border); background:var(--surface); color:var(--text);
                  border-radius:8px; padding:4px 11px; font-size:13px; cursor:pointer; }
  .pager button:hover:not(:disabled) { background:var(--accent-soft); border-color:var(--accent); }
  .pager button:disabled { opacity:.4; cursor:default; }

  /* Notes */
  #notes-area { width:100%; min-height:150px; resize:vertical; border:1px solid var(--border);
    background:var(--bg); color:var(--text); border-radius:12px; padding:14px 16px; font-size:14.5px;
    line-height:1.6; font-family:inherit; outline:none; }
  #notes-area:focus { border-color:var(--accent); }
  #notes-status { font-size:12px; }

  footer { text-align:center; color:var(--muted); font-size:13px; margin-top:48px; }
  footer code { background:var(--accent-soft); padding:1px 6px; border-radius:6px; }

  /* Chat */
  #chat-toggle { position:fixed; right:24px; bottom:24px; width:56px; height:56px; border-radius:50%;
    background:var(--accent); color:#fff; border:none; font-size:24px; cursor:pointer; box-shadow:var(--shadow);
    display:flex; align-items:center; justify-content:center; z-index:50; transition:transform .15s; }
  #chat-toggle:hover { transform:scale(1.06); }
  #chat-panel { position:fixed; right:24px; bottom:92px; width:380px; max-width:calc(100vw - 48px);
    height:520px; max-height:calc(100vh - 140px); background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); box-shadow:var(--shadow); display:none; flex-direction:column; overflow:hidden; z-index:50; }
  #chat-panel.open { display:flex; }
  .chat-head { padding:14px 18px; border-bottom:1px solid var(--border); font-weight:600; font-size:15px; display:flex; align-items:center; gap:8px; }
  .chat-head #chat-model { margin-left:auto; font-size:12px; border:1px solid var(--border); background:var(--bg);
    color:var(--text); border-radius:8px; padding:3px 6px; cursor:pointer; max-width:160px; }
  .chat-head #chat-clear { font-size:11px; border:1px solid var(--border); background:var(--bg); color:var(--muted);
    border-radius:8px; padding:3px 8px; cursor:pointer; }
  .chat-head #chat-clear:hover { color:var(--warn); border-color:var(--warn); }
  .chat-head .status { width:8px; height:8px; border-radius:50%; background:#c0bfb9; }
  .chat-head .status.on { background:var(--accent); }
  #chat-log { flex:1; overflow-y:auto; padding:16px 18px; display:flex; flex-direction:column; gap:12px; }
  .msg { font-size:14px; padding:10px 13px; border-radius:12px; max-width:85%; white-space:pre-wrap; word-wrap:break-word; }
  .msg.user { background:var(--accent); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
  .msg.bot { background:var(--accent-soft); color:var(--text); align-self:flex-start; border-bottom-left-radius:4px; }
  .msg.sys { color:var(--muted); font-size:12.5px; text-align:center; align-self:center; max-width:100%; }
  .chat-input { display:flex; gap:8px; padding:12px; border-top:1px solid var(--border); }
  .chat-input input { flex:1; border:1px solid var(--border); background:var(--bg); color:var(--text);
    border-radius:10px; padding:10px 12px; font-size:14px; outline:none; }
  .chat-input input:focus { border-color:var(--accent); }
  .chat-input button { border:none; background:var(--accent); color:#fff; border-radius:10px; padding:0 16px; font-size:14px; font-weight:600; cursor:pointer; }
  .chat-input button:disabled { opacity:.5; cursor:default; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="greeting" id="greeting">Hello</div>
      <div class="sub"><span id="clock"></span> · <span id="datestr"></span> · <span class="ver" id="version">v?</span></div>
    </div>
    <div id="acct-bar" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"></div>
  </header>

  <!-- Top menu: one collapsed row; each category opens on hover (overlays, no reflow) -->
  <div class="card topmenu" id="menu-card" style="margin-bottom:20px">
    <div class="menu-bar">
      <div id="side-sections" class="menu-items"></div>
      <input type="color" id="theme-pick" class="cdot" title="Highlight color">
    </div>
  </div>

  <div id="layout">
    <main class="main">
      <!-- Live Today panel -->
      <div class="card" style="margin-bottom:20px">
        <h2><span class="dot">⚡</span>Today <span class="refresh" id="today-refresh" style="display:none"><span class="ricon">↻</span> refresh</span></h2>
        <div class="today">
          <div class="col">
            <h3>📅 Next 3 days</h3>
            <div id="agenda"><div class="empty">—</div></div>
          </div>
          <div class="col">
            <h3>✉️ Unread in inbox</h3>
            <div id="mail"><div class="empty">—</div></div>
            <div id="mail-pager" class="pager" style="display:none"></div>
          </div>
        </div>
        <div id="auth-note" class="needsauth" style="display:none"></div>
      </div>

      <!-- Google Tasks (#8) + daily reach-out (#6) -->
      <div class="split live" id="tasks-row" style="margin-bottom:20px;display:none">
        <div class="card" id="tasks-card">
          <h2><span class="dot">✅</span>Tasks
            <span class="refresh" id="tasks-refresh"><span class="ricon">↻</span> refresh</span></h2>
          <div id="tasks"><div class="empty">—</div></div>
        </div>
        <div class="card" id="reachout-card">
          <h2><span class="dot">🤝</span>Stay connected
            <span class="refresh" id="reachout-shuffle">🎲 shuffle</span></h2>
          <div id="reachout"><div class="empty">—</div></div>
        </div>
      </div>

      <!-- Agenda (60%) + Notes (40%) -->
      <div class="split" id="agenda-notes-row" style="margin-bottom:20px">
        <div class="card" id="agenda-view-card" style="display:none">
          <h2><span class="dot">🗓️</span>Agenda
            <span class="refresh" id="agenda-refresh"><span class="ricon">↻</span> refresh</span></h2>
          <div id="agenda-view"><div class="empty">—</div></div>
          <div id="agenda-pager" class="pager" style="display:none"></div>
        </div>
        <!-- Notes — your scratchpad; the agent can read this on request -->
        <div class="card" id="notes">
          <h2><span class="dot">📝</span>Notes
            <span class="refresh" id="notes-sync" style="display:none">🔑 sync</span>
            <span class="refresh" id="notes-status" style="cursor:default;margin-left:10px">saved</span></h2>
          <textarea id="notes-area" placeholder="Jot ideas, writings, links, anything… ask your agent things like “use my notes to draft…” and it’ll read what’s here."></textarea>
        </div>
      </div>
    </main>
  </div>

  <footer>miDash <span class="ver">v?</span> · edit links &amp; settings in the <code>CONFIG</code> block of index.html</footer>
</div>

<!-- Chat agent -->
<button id="chat-toggle" title="Ask your agent">💬</button>
<div id="chat-panel">
  <div class="chat-head"><span>Agent</span>
    <select id="chat-model" title="Chat model — cheaper = lower per-message cost"></select>
    <button id="chat-clear" title="Clear conversation">clear</button>
    <span class="status" id="chat-status"></span></div>
  <div id="chat-log"></div>
  <form class="chat-input" id="chat-form">
    <input id="chat-text" placeholder="Ask for anything…" autocomplete="off" />
    <button type="submit" id="chat-send">Send</button>
  </form>
</div>

<script>
/* ============================================================
   CONFIG — everything you edit lives here.
   ============================================================ */
const CONFIG = {
  name: "Q",

  // Bump this whenever you publish a change you want to recognize on the live site.
  // Shown in the footer next to the live GitHub commit, so you always know which
  // build you're looking at.
  version: "1.7.0",
  repo: "midash",          // your GitHub Pages repo name (for the live build stamp)

  // ---- Chat model picker ----
  // The Worker bills the metered Anthropic API per token (separate from any Max plan).
  // Haiku is the cheapest; switch live via the picker in the chat header.
  models: [
    { id:"claude-haiku-4-5",  label:"Haiku — cheapest" },
    { id:"claude-sonnet-4-6", label:"Sonnet — balanced" },
    { id:"claude-opus-4-8",   label:"Opus — smartest" },
  ],
  defaultModel: "claude-haiku-4-5",

  // Your PERSONAL Google address — pins every Google link to the right account.
  account: "quentin.forgues@gmail.com",

  // Your GitHub username — Projects auto-populate from your recent repos.
  githubUser: "qforgues",

  // ---- Live data (today's events + important mail) ----
  // One-time setup: create a Google OAuth "Web" client ID (see README),
  // authorize https://qforgues.github.io as an origin, then paste the ID here.
  // Leave "" and the Today panel just shows a Connect prompt.
  googleClientId: "649111264239-gro8ns552nso1398knfv03hc63rb5o8d.apps.googleusercontent.com",

  // ---- Chat agent backend (holds your Anthropic key; never in this file) ----
  chatEndpoint: "https://midash-chat.quentin-forgues.workers.dev",

  // How far ahead the Agenda block looks (days). Birthdays etc. are sparse, so a
  // wide window mirrors Google's agenda view.
  agendaDays: 180,

  // Static quick-links. {label,url,meta}. Google links auto-pin to your account.
  sections: [
    { title:"Mail", icon:"✉️", links:[
      { g:"mail", path:"#inbox", label:"Gmail — Inbox" },
      { g:"mail", path:"#starred", label:"Starred" },
      { g:"compose", path:"", label:"Compose" },   // reliable compose deep-link (view=cm)
    ]},
    { title:"Calendar", icon:"📅", links:[
      { g:"cal", path:"r", label:"Google Calendar" },
      { g:"cal", path:"r/eventedit", label:"Add an event" },
      { g:"cal", path:"r/agenda", label:"Agenda view" },
    ]},
    { title:"Work", icon:"💼", links:[
      { g:"drive", path:"", label:"Google Drive" },
      { url:"https://qbo.intuit.com", label:"QuickBooks" },
      { g:"docs", path:"", label:"Docs" },
    ]},
    { title:"Kids", icon:"🧒", links:[
      { g:"photos", path:"", label:"Photos" },
      { g:"cal", path:"r", label:"Family calendar" },
      { url:"#", label:"School portal", meta:"set me" },
    ]},
    { title:"Fun & Play", icon:"🎮", links:[
      { url:"#notes", label:"Notes", meta:"jot ideas" },
      { url:"https://youtube.com", label:"YouTube" },
      { url:"https://open.spotify.com", label:"Spotify" },
      { url:"https://maps.google.com", label:"Maps" },

/* ---------- Build account-pinned Google URLs ---------- */
const A = encodeURIComponent(CONFIG.account);
const G = {
  // Gmail accepts /u/<email>/. Other Google apps are unreliable with an email in
  // the /u/ slot, so we use the ?authuser=<email> param, which they all honor.
  mail:  p => `https://mail.google.com/mail/u/${CONFIG.account}/${p}`,  // literal email — encoding the @ 404s
  // Compose: the `?compose=new` hash form is flaky; `?view=cm&fs=1` reliably opens
  // a compose window. `p`, if set, is a "to" address.
  compose: p => `https://mail.google.com/mail/u/${CONFIG.account}/?view=cm&fs=1${p?`&to=${encodeURIComponent(p)}`:""}`,
  cal:   p => `https://calendar.google.com/calendar/${p}?authuser=${A}`,
  drive: p => `https://drive.google.com/drive/u/0/?authuser=${A}`,
  docs:  p => `https://docs.google.com/document/u/0/?authuser=${A}`,
  photos:p => `https://photos.google.com/?authuser=${A}`,
};
/* Compose to a specific address from a specific account (used by Contacts + daily reach-out).
   Optional subject/body prefill the draft (Gmail honors &su= and &body=). */
function gmailComposeUrl(email,to,subject,body){
  let u=`https://mail.google.com/mail/u/${email||CONFIG.account}/?view=cm&fs=1`;
  if(to) u+=`&to=${encodeURIComponent(to)}`;
  if(subject) u+=`&su=${encodeURIComponent(subject)}`;
  if(body) u+=`&body=${encodeURIComponent(body)}`;
  return u;
}
function urlFor(l){ return l.g ? G[l.g](l.path || "") : l.url; }

/* ---------- Best-effort link health (see note below) ----------
   Browsers hide the real HTTP status of cross-origin sites, so this can only
   tell "responds" (green) vs "dead domain / blocked" (red) vs "placeholder"
   (grey). It cannot reliably tell a 404 page from a working one. */
function pingLinks(){
  document.querySelectorAll(".ldot[data-url]").forEach(dot=>{
    const u=dot.dataset.url;
    if(!u || u==="#"){ dot.className="ldot set"; dot.title="No URL set"; return; }
    // Google app links are auth-gated and always reject cross-origin probes — skip the
    // fetch (it just spams the console with 403s); they're known-good when signed in.
    if(/^https:\/\/(mail|calendar|drive|docs|photos|accounts)\.google\.com/.test(u) || /googleapis\.com/.test(u)){
      dot.className="ldot up"; dot.title="Signed-in Google link"; return;
    }
    const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),5000);
    fetch(u,{mode:"no-cors",signal:ctrl.signal})
      .then(()=>{ dot.className="ldot up"; dot.title="Responds"; })
      .catch(()=>{ dot.className="ldot down"; dot.title="No response / blocked"; })
      .finally(()=>clearTimeout(to));
  });
}

async function onToken(resp){
  if(!resp || !resp.access_token) return;
  let email="account";
  try{
    const info=await (await fetch("https://www.googleapis.com/oauth2/v3/userinfo",{headers:{Authorization:"Bearer "+resp.access_token}})).json();
    email=info.email||email;
  }catch(e){}
  const exp=Date.now()+((resp.expires_in||3000)*1000);
  const found=accounts.find(a=>a.email===email);
  if(found){ found.token=resp.access_token; found.exp=exp; } else accounts.push({email, token:resp.access_token, exp});
  accessToken=accounts[0].token; saveAccounts(); afterAuth();
}

async function gfetch(url, token){

function dayLabel(d){
  const today=new Date(); today.setHours(0,0,0,0);
  const diff=Math.round((new Date(new Date(d).setHours(0,0,0,0))-today)/86400000);
  return diff===0?"Today":diff===1?"Tomorrow":d.toLocaleDateString([],{weekday:"long",month:"short",day:"numeric"});
}
let agendaEvents=[];   // shared by the 3-day panel and the 7-day Agenda View
async function loadAgenda(){
  const box=document.getElementById("agenda");
  if(!accounts.length){ box.innerHTML=`<div class="empty">—</div>`; agendaEvents=[]; renderAgendaView(); return; }
  try{
    const s=new Date(); s.setHours(0,0,0,0); const e=new Date(s); e.setDate(e.getDate()+(CONFIG.agendaDays||30)); // wide window for the agenda block
    let all=[];
    for(const acct of accounts){
      let cals;
      try{ cals=await gfetch("https://www.googleapis.com/calendar/v3/users/me/calendarList?minAccessRole=reader", acct.token); }catch(e){ continue; }
      for(const c of (cals.items||[])){
        if(c.selected===false) continue;  // honor the calendars you've ticked on in Google
        try{
          const data=await gfetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(c.id)}/events?singleEvents=true&orderBy=startTime&timeMin=${s.toISOString()}&timeMax=${e.toISOString()}`, acct.token);
          (data.items||[]).forEach(x=>{
            const timed=!!x.start.dateTime;
            const dt=timed?new Date(x.start.dateTime):new Date(x.start.date+"T00:00:00");
            const end=x.end?(x.end.dateTime?new Date(x.end.dateTime):new Date(x.end.date+"T00:00:00")):null;
            all.push({dt, end, timed, x, acct:acct.email});
          });
        }catch(e){}
      }
    }
    all.sort((a,b)=>a.dt-b.dt);
    agendaEvents=all.filter(o=>!isOver(o));   // drop finished meetings entirely (no strikethrough)
    renderAgenda(box, 3, "Nothing scheduled — clear runway 🎉");
    renderAgendaView();
  }catch(err){ if(err.message==="expired") showConnect(); else box.innerHTML=`<div class="empty">Couldn't load calendar.</div>`; }
}

/* An event is "over" once it has ended. Timed: end < now. All-day: its end date
   (exclusive in Google's API) is on or before today. */
function isOver(o){
  const now=Date.now();
  if(o.timed) return o.end ? o.end.getTime()<now : o.dt.getTime()+3600000<now;
  const todayStart=new Date().setHours(0,0,0,0);
  const end = o.end ? o.end.getTime() : o.dt.getTime()+86400000;
  return end<=todayStart;
}
/* Who else is on the invite (excludes you and meeting-room resources). */
function attendeesLabel(x){
  const a=(x.attendees||[]).filter(p=>!p.self && !p.resource);
  if(!a.length) return "";
  const names=a.map(p=>(p.displayName||p.email||"").split("@")[0]).filter(Boolean);
  const shown=names.slice(0,3); const extra=names.length-shown.length;
  return `<span class="att" title="${esc(names.join(", "))}">👥 ${esc(shown.join(", "))}${extra>0?` +${extra}`:""}</span>`;
}
function eventRow(o){
  const t = o.timed ? o.dt.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) : "all day";
  const href = o.x.htmlLink ? ` href="${o.x.htmlLink}" target="_blank" rel="noopener"` : "";
  const tag = accounts.length>1 ? acctPill(o.acct) : "";
  const p = accounts.length>1 ? acctColor(o.acct) : "var(--accent)";
  const att = attendeesLabel(o.x);
  return `<a class="row ev" style="--p:${p}"${href}>
    <span class="t">${t}</span>
    <span class="s">${esc(o.x.summary||"(no title)")}${o.x.location?` <span class="lbl">${esc(o.x.location)}</span>`:""}${tag}${att?`<br>${att}`:""}</span>
  </a>`;
}
function renderAgenda(box, days, emptyMsg){
  const cut=new Date(); cut.setHours(0,0,0,0); cut.setDate(cut.getDate()+days);
  const evs=agendaEvents.filter(o=>o.dt<cut);
  if(!evs.length){ box.innerHTML=`<div class="empty">${emptyMsg}</div>`; return; }
  box.innerHTML=groupByDay(evs);
}
const AGENDA_PER=10, AGENDA_MAX=20;
let agendaPage=0;
function agendaRowHTML(o, showDate){
  const multi=accounts.length>1;
  const dnum=o.dt.getDate();
  const dlab=`${o.dt.toLocaleDateString([],{month:"short"})}, ${o.dt.toLocaleDateString([],{weekday:"short"})}`.toUpperCase();
  const time = o.timed ? `${fmtT(o.dt)}${o.end?` – ${fmtT(o.end)}`:""}` : "All day";
  const color = multi ? acctColor(o.acct) : "var(--accent)";
  const href = o.x.htmlLink ? ` href="${o.x.htmlLink}" target="_blank" rel="noopener"` : "";
  const loc = o.x.location ? `<span class="agloc">${esc(o.x.location)}</span>` : "";
  const idtag = multi ? acctPill(o.acct) : "";
  const att = attendeesLabel(o.x);
  return `<a class="agrow" style="--p:${color}"${href}>
    <span class="agdate">${showDate?`<span class="agdnum">${dnum}</span><span class="agdlab">${dlab}</span>`:""}</span>
    <span class="agdot"></span>
    <span class="agtime">${time}</span>
    <span class="agtitle">${esc(o.x.summary||"(no title)")} ${loc}${idtag}${att?`<br>${att}`:""}</span>
  </a>`;
}
function renderAgendaView(){
  const box=document.getElementById("agenda-view"), pager=document.getElementById("agenda-pager"); if(!box) return;
  if(!agendaEvents.length){ box.innerHTML=`<div class="empty">Nothing on the calendar in the next ${CONFIG.agendaDays||30} days 🎉</div>`; pager.style.display="none"; return; }
  const list=agendaEvents.slice(0,AGENDA_MAX);          // never show more than 20
  const pages=Math.ceil(list.length/AGENDA_PER);
  agendaPage=Math.max(0,Math.min(agendaPage,pages-1));
  const start=agendaPage*AGENDA_PER;
  const slice=list.slice(start,start+AGENDA_PER);
  let lastDay="";
  const rows=slice.map(o=>{ const k=o.dt.toDateString(); const show=k!==lastDay; lastDay=k; return agendaRowHTML(o,show); }).join("");
  const last=list[list.length-1].dt.toLocaleDateString([],{month:"short",day:"numeric",year:"numeric"});
  box.innerHTML=rows+`<div class="agfoot">Showing through ${last} · <a href="${G.cal("r/agenda")}" target="_blank" rel="noopener">Open in Google Calendar ↗</a></div>`;
  if(pages<=1){ pager.style.display="none"; return; }
  pager.style.display="flex";
  pager.innerHTML=`<button id="a-prev"${agendaPage===0?" disabled":""}>‹ prev</button>
    <span>${start+1}–${start+slice.length} of ${list.length}</span>
    <button id="a-next"${agendaPage>=pages-1?" disabled":""}>next ›</button>`;
  document.getElementById("a-prev").onclick=()=>{ agendaPage--; renderAgendaView(); };
  document.getElementById("a-next").onclick=()=>{ agendaPage++; renderAgendaView(); };
}
function fmtT(d){ return d.toLocaleTimeString([],{hour:"numeric",minute:d.getMinutes()?"2-digit":undefined}).toLowerCase().replace(" ",""); }
function groupByDay(evs){
  const groups={}; evs.forEach(o=>{ const k=o.dt.toDateString(); (groups[k]=groups[k]||[]).push(o); });
  const todayStr=new Date().toDateString();
  return Object.keys(groups).map(k=>{
    const isToday=k===todayStr;
    return `<div class="dayhead${isToday?" today":""}">${dayLabel(new Date(k))}</div>`
      + groups[k].map(eventRow).join("");
  }).join("");
}

/* Gmail system label → friendly name. Anything not here uses its raw user-label name. */
const SYS_LABELS={CATEGORY_SOCIAL:"Social",CATEGORY_PROMOTIONS:"Promotions",CATEGORY_UPDATES:"Updates",CATEGORY_FORUMS:"Forums",IMPORTANT:"Important",STARRED:"Starred"};
/* labels we never show as pills (plumbing or redundant) */
const HIDE_LABELS=new Set(["INBOX","UNREAD","SENT","DRAFT","SPAM","TRASH","CHAT","CATEGORY_PERSONAL"]);

function labelPills(ids,map){

// Deep-link by THREAD id (more reliable than message id for opening a conversation).
function gmailMsgUrl(email,threadId){ return `https://mail.google.com/mail/u/${email}/#all/${threadId}`; }
function gmailSearchUrl(email,q){ return `https://mail.google.com/mail/u/${email}/#search/${encodeURIComponent(q)}`; }
/* Compact "how old" label for an email date. */
function mailAge(d){
  const ms=Date.now()-d.getTime();
  if(ms<0||!isFinite(ms)) return "";
  const m=ms/60000, h=m/60, days=h/24;
  if(m<1) return "just now";
  if(h<1) return Math.floor(m)+"m ago";
  if(days<1) return Math.floor(h)+"h ago";
  if(days<7) return Math.floor(days)+"d ago";
  if(days<30) return Math.floor(days/7)+"w ago";
  return Math.floor(days/30)+"mo ago";
}
async function loadMail(){
  const box=document.getElementById("mail");
  if(!accounts.length){ box.innerHTML=`<div class="empty">—</div>`; document.getElementById("mail-pager").style.display="none"; return; }
  try{
    const multi=accounts.length>1;
    let rows=[];
    for(const acct of accounts){
      let map={}; try{ map=await getLabelMap(acct.token); }catch(e){}
      let list; try{ list=await gfetch("https://www.googleapis.com/gmail/v1/users/me/messages?maxResults=15&q="+encodeURIComponent("in:inbox is:unread"), acct.token); }catch(e){ continue; }
      const ids=(list.messages||[]).map(m=>m.id);
      if(!ids.length) continue;
      const msgs=await Promise.all(ids.map(id=>gfetch(`https://www.googleapis.com/gmail/v1/users/me/messages/${id}?format=metadata&metadataHeaders=Subject&metadataHeaders=From&metadataHeaders=Date`, acct.token)));
      msgs.forEach(m=>{
        const h=Object.fromEntries((m.payload.headers||[]).map(x=>[x.name,x.value]));
        const acctTag=multi?acctPill(acct.email):"";
        const p=multi?acctColor(acct.email):"var(--accent)";
        const when=h.Date?new Date(h.Date):new Date(0);
        const age=mailAge(when);
        rows.push({when, html:`<a class="row mailrow" style="--p:${p}" href="${gmailMsgUrl(acct.email,m.threadId||m.id)}" target="_blank" rel="noopener">
          <span class="s">${esc(h.Subject||"(no subject)")} ${labelPills(m.labelIds,map)}${acctTag}</span>
          <span class="from">${esc(cleanFrom(h.From||""))}${age?` · <span class="age">${age}</span>`:""}</span></a>`});
      });
    }
    rows.sort((a,b)=>b.when-a.when);
    mailRows=rows.map(r=>r.html); mailPage=0;
    renderMailPage();
  }catch(err){ if(err.message!=="expired") box.innerHTML=`<div class="empty">Couldn't load mail.</div>`; }
}
function renderMailPage(){
  const box=document.getElementById("mail"), pager=document.getElementById("mail-pager");
  if(!mailRows.length){ box.innerHTML=`<div class="empty">Inbox zero — nothing unread 🎉</div>`; pager.style.display="none"; return; }
  const pages=Math.ceil(mailRows.length/MAIL_PER);
  mailPage=Math.max(0,Math.min(mailPage,pages-1));
  const start=mailPage*MAIL_PER;
  box.innerHTML=mailRows.slice(start,start+MAIL_PER).join("");
  if(pages<=1){ pager.style.display="none"; return; }
  pager.style.display="flex";
  pager.innerHTML=`<button id="m-prev"${mailPage===0?" disabled":""}>‹ prev</button>
    <span>${start+1}–${Math.min(start+MAIL_PER,mailRows.length)} of ${mailRows.length}</span>
    <button id="m-next"${mailPage>=pages-1?" disabled":""}>next ›</button>`;
  document.getElementById("m-prev").onclick=()=>{ mailPage--; renderMailPage(); };
  document.getElementById("m-next").onclick=()=>{ mailPage++; renderMailPage(); };
}

function cleanFrom(s){ const m=s.match(/^(.*?)</); return (m?m[1]:s).replace(/"/g,"").trim()||s; }
function esc(s){ return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

/* ============================================================
   CONTACTS (Google People API) — powers the dropdown (#11)
   and the daily reach-out (#6). Needs the contacts.readonly scope,
   so a one-time reconnect is required after this update.
   ============================================================ */
/* Turn a Google API error body into a short, actionable message. Google's own
   message for a disabled API includes the exact "enable it here" link, so we
   surface it verbatim. */
function apiErrMsg(err, apiLabel, enableUrl){
  const raw=(err && (err.message||err.status))||"";
  const low=String(raw).toLowerCase();
  if(/has not been used|is disabled|not been used in project|enable it by visiting/.test(low)){
    return `${apiLabel} API isn't enabled in your Google Cloud project. <a href="${enableUrl}" target="_blank" rel="noopener">Enable it ↗</a>, wait a minute, then refresh.`;
  }
  if(/insufficient|scope|permission|forbidden|access_token/.test(low) || (err&&err.code===403)){
    return `This account hasn't granted ${apiLabel} access. Use “🔓 reconnect” and approve ${apiLabel} for each account.`;
  }
  return esc(raw||(`Couldn't load ${apiLabel}.`));
}
const PEOPLE_ENABLE="https://console.cloud.google.com/apis/library/people.googleapis.com";
const TASKS_ENABLE="https://console.cloud.google.com/apis/library/tasks.googleapis.com";

let contactsList=[], contactsErr=null;
async function loadContacts(){
  contactsErr=null;
  if(!accounts.length){ renderContacts(); renderReachout(); return; }
  let all=[];
  for(const acct of accounts){
    let d; try{ d=await gfetch("https://people.googleapis.com/v1/people/me/connections?pageSize=1000&personFields=names,emailAddresses&sortOrder=FIRST_NAME_ASCENDING", acct.token); }catch(e){ continue; }
    if(d && d.error){ console.warn("[contacts]", acct.email, d.error); if(!contactsErr) contactsErr=apiErrMsg(d.error,"Contacts (People)",PEOPLE_ENABLE); continue; }
    (d.connections||[]).forEach(p=>{
      const email=(p.emailAddresses||[])[0] && (p.emailAddresses||[])[0].value;
      const name=((p.names||[])[0] && (p.names||[])[0].displayName) || (email||"").split("@")[0];
      if(email) all.push({name, email});
    });
  }
  const seen=new Set();
  contactsList=all.filter(c=>{ const k=c.email.toLowerCase(); if(seen.has(k)) return false; seen.add(k); return true; })
                  .sort((a,b)=>a.name.localeCompare(b.name));
  renderContacts();
  renderReachout();
}
function reconnectBtn(id){ return `<button class="gbtn" id="${id}" style="margin-top:8px">🔓 reconnect (pick account)</button>`; }
/* select_account so the user can re-grant scopes for the WORK account too, not just the default one. */
function wireReconnect(id){ const b=document.getElementById(id); if(b) b.onclick=()=>tokenClient.requestAccessToken({prompt:"select_account consent"}); }
function renderContacts(){
  const box=document.getElementById("contacts"); if(!box) return;
  if(!accounts.length){ box.innerHTML=`<div class="empty">connect Google…</div>`; return; }
  if(!contactsList.length && contactsErr){ box.innerHTML=`<div class="empty" style="line-height:1.4">${contactsErr}</div>`; return; }
  if(!contactsList.length){ box.innerHTML=`<div class="empty">No contacts found.</div>`; return; }
  box.innerHTML=contactsList.slice(0,300).map(c=>
    `<a href="${gmailComposeUrl(CONFIG.account,c.email)}" target="_blank" rel="noopener" title="${esc(c.email)}">
       <span class="lhs">${esc(c.name)}</span><span class="arrow">✉</span></a>`).join("");
}
/* Stable day index so the daily pick is the same all day, then shuffles on demand. */
function dayIndex(){ const d=new Date(); return Math.floor((d-new Date(d.getFullYear(),0,0))/86400000); }
let reachoutContact=null;
function renderReachout(shuffle){
  const box=document.getElementById("reachout"); if(!box) return;
  if(!accounts.length){ box.innerHTML=`<div class="empty">—</div>`; return; }
  if(!contactsList.length && contactsErr){ box.innerHTML=`<div class="needsauth" style="line-height:1.4">${contactsErr}<br>${reconnectBtn("reconnect-contacts")}</div>`; wireReconnect("reconnect-contacts"); return; }
  if(!contactsList.length){ box.innerHTML=`<div class="empty">No contacts to suggest yet.</div>`; return; }
  const i = shuffle ? Math.floor(Math.random()*contactsList.length) : (dayIndex()%contactsList.length);
  const c=contactsList[i]; reachoutContact=c;
  box.innerHTML=`<div style="font-size:13px;color:var(--muted);margin-bottom:8px">Today's nudge — say hi to:</div>
    <div style="font-size:18px;font-weight:600;letter-spacing:-.01em">${esc(c.name)}</div>
    <div class="from" style="margin:2px 0 14px">${esc(c.email)}</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="gbtn" id="reach-draft">✨ Draft &amp; open</button>
      <a class="gbtn" id="reach-blank" href="${gmailComposeUrl(CONFIG.account,c.email)}" target="_blank" rel="noopener" style="text-decoration:none;display:inline-flex;color:var(--muted)">blank email</a>
    </div>
    <div id="reach-note" class="from" style="margin-top:8px"></div>`;
  const db=document.getElementById("reach-draft");
  if(db) db.onclick=()=>aiDraftAndOpen(reachoutContact, db);
}

/* Pull recent Gmail history with this contact, ask the model for a subject + body,
   then open Gmail compose pre-filled. The compose window is opened on the click
   (user gesture) so popup blockers don't eat it, then navigated once the draft is ready. */
async function aiDraftAndOpen(c, btn){
  if(!c) return;
  const note=document.getElementById("reach-note");
  const win=window.open("about:blank","_blank");   // reserve the tab during the user gesture
  const fail=(msg)=>{ if(note) note.textContent=msg; if(win) win.location.href=gmailComposeUrl(CONFIG.account,c.email); };
  if(!CONFIG.chatEndpoint){ fail("Agent offline — opened a blank email."); return; }
  if(btn){ btn.disabled=true; btn.textContent="✨ drafting…"; }
  try{
    // gather recent threads with this contact across all accounts
    let ctx=[];
    for(const acct of accounts){
      let list; try{ list=await gfetch("https://www.googleapis.com/gmail/v1/users/me/messages?maxResults=6&q="+encodeURIComponent(`from:${c.email} OR to:${c.email}`), acct.token); }catch(e){ continue; }
      const ids=(list.messages||[]).map(m=>m.id).slice(0,6);
      const msgs=await Promise.all(ids.map(id=>gfetch(`https://www.googleapis.com/gmail/v1/users/me/messages/${id}?format=metadata&metadataHeaders=Subject&metadataHeaders=From&metadataHeaders=Date`, acct.token)));
      msgs.forEach(m=>{ const h=hdr(m); ctx.push(`${(h.Date||"").slice(0,16)} | from ${cleanFrom(h.From||"")} | ${h.Subject||"(no subject)"} | ${(m.snippet||"").slice(0,200)}`); });
    }
    const history = ctx.length ? ctx.join("\n") : "(no prior emails found with this person)";
    const prompt = `You are drafting a short, warm, casual check-in email from ${CONFIG.name} to ${c.name} <${c.email}> to reconnect and stay in touch. `
      + `Base the tone and any references on the recent email history below. Keep it brief (2-4 sentences), friendly, and specific if the history gives you something to reference; otherwise a simple genuine hello. Sign off as ${CONFIG.name}. `
      + `Recent email history (most recent first may vary):\n${history}\n\n`
      + `Do not call any tools — everything you need is in this message. `
      + `Respond with ONLY a JSON object, no markdown, no commentary: {"subject": "...", "body": "..."}`;
    const res=await fetch(CONFIG.chatEndpoint,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:selectedModel(), messages:[{role:"user",content:prompt}]})});
    const data=await res.json();
    if(data.error) throw new Error(data.error.message||"model error");
    let txt=((data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n")).trim();
    txt=txt.replace(/^```(?:json)?\s*/i,"").replace(/```$/,"").trim();
    let subject="", body="";
    try{ const j=JSON.parse(txt); subject=j.subject||""; body=j.body||""; }
    catch(e){ body=txt; }   // model didn't return clean JSON — use whatever text it gave as the body
    if(win) win.location.href=gmailComposeUrl(CONFIG.account, c.email, subject, body);
    if(note) note.textContent="Draft opened in Gmail ↗ — review before sending.";
  }catch(err){
    fail("Couldn't draft ("+(err.message||err)+") — opened a blank email.");
  }finally{
    if(btn){ btn.disabled=false; btn.textContent="✨ Draft & open"; }
  }
}

/* ============================================================
   GOOGLE TASKS (#8) — read-only across all connected accounts.
   Needs the tasks.readonly scope (same one-time reconnect).
   ============================================================ */
async function loadTasks(){
  const box=document.getElementById("tasks"); if(!box) return;
  if(!accounts.length){ box.innerHTML=`<div class="empty">—</div>`; return; }
  let out=[], err=null, failedAccts=[];
  for(const acct of accounts){
    let lists; try{ lists=await gfetch("https://www.googleapis.com/tasks/v1/users/@me/lists", acct.token); }catch(e){ continue; }
    if(lists && lists.error){ console.warn("[tasks]", acct.email, lists.error); if(!err) err=apiErrMsg(lists.error,"Tasks",TASKS_ENABLE); failedAccts.push(acct.email); continue; }
    for(const tl of (lists.items||[])){
      let t; try{ t=await gfetch(`https://www.googleapis.com/tasks/v1/lists/${encodeURIComponent(tl.id)}/tasks?showCompleted=false&maxResults=100`, acct.token); }catch(e){ continue; }
      if(t && t.error){ continue; }
      (t.items||[]).filter(x=>x.status!=="completed" && x.title).forEach(x=>{
        out.push({acct:acct.email, title:x.title, due:x.due?new Date(x.due):null});
      });
    }
  }
  renderTasks(out, err, failedAccts);
}
function renderTasks(items, err, failedAccts){
  const box=document.getElementById("tasks"); if(!box) return;
  if(!items.length && err){ box.innerHTML=`<div class="needsauth" style="line-height:1.4">${err}<br>${reconnectBtn("reconnect-tasks")}</div>`; wireReconnect("reconnect-tasks"); return; }
  if(!items.length){ box.innerHTML=`<div class="empty">No open tasks 🎉</div>`; return; }
  const multi=accounts.length>1;
  items.sort((a,b)=>(a.due?a.due.getTime():Infinity)-(b.due?b.due.getTime():Infinity));
  let html=items.map(t=>{
    const p=multi?acctColor(t.acct):"var(--accent)";
    const due=t.due?` <span class="att">📅 ${t.due.toLocaleDateString([],{month:"short",day:"numeric"})}</span>`:"";
    const tag=multi?acctPill(t.acct):"";
    return `<div class="item" style="--p:${p}"><span class="s">☐ ${esc(t.title)}${tag}${due}</span></div>`;
  }).join("");
  // Some accounts loaded, others failed (e.g. work account hasn't granted the scope yet)
  if((failedAccts||[]).length){
    html+=`<div class="needsauth" style="margin-top:12px;line-height:1.4">${failedAccts.map(esc).join(", ")} need Tasks access. ${reconnectBtn("reconnect-tasks")}</div>`;
  }
  box.innerHTML=html;
  if((failedAccts||[]).length) wireReconnect("reconnect-tasks");
}

/* ---------- Chat agent ---------- */
const log=document.getElementById("chat-log");
function addMsg(text,cls){ const d=document.createElement("div"); d.className="msg "+cls; d.textContent=text; log.appendChild(d); log.scrollTop=log.scrollHeight; return d; }
document.getElementById("chat-toggle").addEventListener("click",()=>{ const p=document.getElementById("chat-panel"); p.classList.toggle("open"); if(p.classList.contains("open")) document.getElementById("chat-text").focus(); });
/* ---- Chat model picker (#1) ---- */
function selectedModel(){ try{ return localStorage.getItem("midash_model")||CONFIG.defaultModel; }catch(e){ return CONFIG.defaultModel; } }
function initModelPicker(){
  const sel=document.getElementById("chat-model"); if(!sel) return;
  sel.innerHTML=(CONFIG.models||[]).map(m=>`<option value="${m.id}">${esc(m.label)}</option>`).join("");
  sel.value=selectedModel();
  sel.onchange=()=>{ try{ localStorage.setItem("midash_model", sel.value); }catch(e){} };
}
function showIntro(){ addMsg("Hi! I work across all your connected Google accounts — calendar + email — and can read your Notes. Try: “reply to the latest email from Sam”, “delete the all-day birthday events in August”, or “draft a post from my notes”. I’ll confirm before sending or deleting.","bot"); }
function initChat(){
  const on=!!CONFIG.chatEndpoint;
  document.getElementById("chat-status").classList.toggle("on",on);
  const cb=document.getElementById("chat-clear");
  if(cb) cb.onclick=()=>{ clearChat(); if(on) showIntro(); };
  if(!on){ addMsg("Agent is offline. Deploy the Cloudflare Worker and set CONFIG.chatEndpoint — see README.","sys"); return; }
  // Restore the prior conversation so a refresh / navigation continues where you left off.
  loadChat().forEach(m=>agentMessages.push(m));
  if(agentMessages.length) renderChatHistory();
  else showIntro();
}

/* ---- Agent loop (tools run here in your browser with your Google login) ---- */
const agentMessages=[];

/* Persist the conversation so it survives refresh / navigation. We store the
   full agentMessages array (what the model needs to continue) and re-derive the
   visible bubbles from it on load. */
const CHAT_KEY="midash_chat";
function saveChat(){ try{ localStorage.setItem(CHAT_KEY, JSON.stringify(agentMessages)); }catch(e){} }
function loadChat(){ try{ const a=JSON.parse(localStorage.getItem(CHAT_KEY)||"[]"); return Array.isArray(a)?a:[]; }catch(e){ return []; } }
function clearChat(){ agentMessages.length=0; try{ localStorage.removeItem(CHAT_KEY); }catch(e){} if(log) log.innerHTML=""; }
function renderChatHistory(){
  for(const m of agentMessages){
    if(m.role==="user"){
      if(typeof m.content==="string") addMsg(m.content,"user");   // tool_result arrays are internal — skip
    } else if(m.role==="assistant"){
      const blocks=Array.isArray(m.content)?m.content:[];
      const txt=blocks.filter(b=>b && b.type==="text").map(b=>b.text).join("\n").trim();
      if(txt) addMsg(txt,"bot");
    }
  }
}

async function callModel(){
  const res=await fetch(CONFIG.chatEndpoint,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:agentMessages, model:selectedModel()})});
  if(!res.ok) throw new Error("HTTP "+res.status);
  return res.json();  // raw Anthropic response
}

document.getElementById("chat-form").addEventListener("submit",async(e)=>{
  e.preventDefault();
  const input=document.getElementById("chat-text"); const text=input.value.trim(); if(!text) return;
  if(!CONFIG.chatEndpoint){ addMsg("No backend configured yet.","sys"); return; }
  addMsg(text,"user"); agentMessages.push({role:"user",content:text}); saveChat(); input.value="";
  const sendBtn=document.getElementById("chat-send"); sendBtn.disabled=true;
  const thinking=addMsg("…","bot");
  try{ await agentLoop(thinking); }
  catch(err){ thinking.className="msg sys"; thinking.textContent="Agent error: "+err.message; }
  finally{ sendBtn.disabled=false; document.getElementById("chat-text").focus(); }
});

async function agentLoop(thinking){
  let bubble=thinking, used=false;
  for(let i=0;i<8;i++){  // safety cap on tool rounds
    const data=await callModel();
    if(data.error) throw new Error(data.error.message||JSON.stringify(data.error));
    agentMessages.push({role:"assistant",content:data.content}); saveChat();
    const txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
    if(txt){ if(!used){ bubble.textContent=txt; used=true; } else addMsg(txt,"bot"); }
    if(data.stop_reason!=="tool_use"){ if(!used) bubble.remove(); return; }
    if(!used){ bubble.textContent="working…"; }
    const calls=(data.content||[]).filter(b=>b.type==="tool_use");
    const results=[];
    for(const c of calls){
      const out=await executeTool(c.name, c.input||{});
      results.push({type:"tool_result",tool_use_id:c.id,content:typeof out==="string"?out:JSON.stringify(out)});
    }
    agentMessages.push({role:"user",content:results}); saveChat();
    used=false; bubble=addMsg("…","bot");
  }
  bubble.textContent="(stopped — too many steps)";
}

/* ---- Tool execution against Gmail / Calendar ---- */
function hdr(m){ return Object.fromEntries((m.payload.headers||[]).map(x=>[x.name,x.value])); }
function b64url(s){ return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""); }
function decB64(d){ try{ return decodeURIComponent(escape(atob(d.replace(/-/g,"+").replace(/_/g,"/")))); }catch(e){ return ""; } }
function bodyOf(p){ if(!p) return ""; if(p.mimeType==="text/plain"&&p.body&&p.body.data) return decB64(p.body.data);
  if(p.parts){ for(const x of p.parts){ const t=bodyOf(x); if(t) return t; } } if(p.body&&p.body.data) return decB64(p.body.data); return ""; }

function acctByEmail(email){ return accounts.find(a=>a.email===email)||null; }
/* Find which connected account holds a Gmail message id (prefer a hinted account). */
async function msgAccount(id, prefer){
  const order=[]; if(prefer&&acctByEmail(prefer)) order.push(acctByEmail(prefer));
  accounts.forEach(a=>{ if(!order.includes(a)) order.push(a); });
  for(const acct of order){
    try{ const m=await gfetch(`https://www.googleapis.com/gmail/v1/users/me/messages/${id}?format=metadata&metadataHeaders=From`, acct.token); if(m&&m.id) return acct; }catch(e){}
  }
  return null;
}

async function executeTool(name,a){
  const noGoogle = (name==="read_notes");
  if(!noGoogle && !accounts.length) return {error:"Google isn't connected. Click Connect Google, then retry."};
  try{
    switch(name){
      case "read_notes": {
        const res=await fetchNotes();
        if(res && typeof res.notes==="string"){ cacheNotes(res.notes); return {notes:res.notes||"(empty)", chars:res.notes.length, source:"synced"}; }
        const n=getNotes(); return {notes:n||"(empty)", chars:n.length, source:"local"};
      }

      case "search_emails": {
        let out=[];
        for(const acct of accounts){
          let list; try{ list=await gfetch("https://www.googleapis.com/gmail/v1/users/me/messages?maxResults="+(a.max||5)+"&q="+encodeURIComponent(a.query||"is:unread"), acct.token); }catch(e){ continue; }
          const ids=(list.messages||[]).map(m=>m.id);
          const msgs=await Promise.all(ids.map(id=>gfetch(`https://www.googleapis.com/gmail/v1/users/me/messages/${id}?format=metadata&metadataHeaders=Subject&metadataHeaders=From&metadataHeaders=Date`, acct.token)));
          msgs.forEach(m=>{ const h=hdr(m); out.push({id:m.id,account:acct.email,from:h.From,subject:h.Subject,date:h.Date,snippet:m.snippet}); });
        }
        return out;
      }
      case "get_email": {
        const acct=await msgAccount(a.id,a.account); if(!acct) return {error:"message not found in any connected account"};
        const m=await gfetch(`https://www.googleapis.com/gmail/v1/users/me/messages/${a.id}?format=full`, acct.token); const h=hdr(m);
        return {id:m.id,account:acct.email,from:h.From,to:h.To,subject:h.Subject,date:h.Date,body:bodyOf(m.payload).slice(0,4000)};
      }
      case "reply_email": {
        const acct=await msgAccount(a.id,a.account); if(!acct) return {error:"message not found in any connected account"};
        const m=await gfetch(`https://www.googleapis.com/gmail/v1/users/me/messages/${a.id}?format=metadata&metadataHeaders=From&metadataHeaders=Subject&metadataHeaders=Message-ID`, acct.token); const h=hdr(m);
        if(!confirm(`Send this reply from ${acct.email} to ${h.From}?\n\n${a.body}`)) return {cancelled:true,note:"User declined — do not retry."};
        const subj=/^re:/i.test(h.Subject||"")?h.Subject:"Re: "+(h.Subject||"");
        const raw=["To: "+h.From,"Subject: "+subj,h["Message-ID"]?"In-Reply-To: "+h["Message-ID"]:"",h["Message-ID"]?"References: "+h["Message-ID"]:"","Content-Type: text/plain; charset=UTF-8","",a.body].filter(Boolean).join("\r\n");
        const r=await fetch("https://www.googleapis.com/gmail/v1/users/me/messages/send",{method:"POST",headers:{Authorization:"Bearer "+acct.token,"Content-Type":"application/json"},body:JSON.stringify({raw:b64url(raw),threadId:m.threadId})});
        loadMail(); return r.ok?{sent:true,account:acct.email}:{error:"send failed "+r.status};
      }
      case "trash_email": {
        const acct=await msgAccount(a.id,a.account); if(!acct) return {error:"message not found in any connected account"};
        if(!confirm(`Move this email to Trash (${acct.email})?`)) return {cancelled:true,note:"User declined — do not retry."};
        const r=await fetch(`https://www.googleapis.com/gmail/v1/users/me/messages/${a.id}/trash`,{method:"POST",headers:{Authorization:"Bearer "+acct.token}});
        loadMail(); return r.ok?{trashed:true,account:acct.email}:{error:"trash failed "+r.status};
      }
      case "archive_email": {
        const acct=await msgAccount(a.id,a.account); if(!acct) return {error:"message not found in any connected account"};
        const r=await fetch(`https://www.googleapis.com/gmail/v1/users/me/messages/${a.id}/modify`,{method:"POST",headers:{Authorization:"Bearer "+acct.token,"Content-Type":"application/json"},body:JSON.stringify({removeLabelIds:["INBOX"]})});
        loadMail(); return r.ok?{archived:true,account:acct.email}:{error:"archive failed "+r.status};
      }
      case "mark_read": {
        const acct=await msgAccount(a.id,a.account); if(!acct) return {error:"message not found in any connected account"};
        const r=await fetch(`https://www.googleapis.com/gmail/v1/users/me/messages/${a.id}/modify`,{method:"POST",headers:{Authorization:"Bearer "+acct.token,"Content-Type":"application/json"},body:JSON.stringify({removeLabelIds:["UNREAD"]})});
        loadMail(); return r.ok?{marked_read:true,account:acct.email}:{error:"modify failed "+r.status};
      }
      case "list_events": {
        const s=new Date(); s.setHours(0,0,0,0); const e=new Date(s); e.setDate(e.getDate()+(a.days||7));
        let out=[];
        for(const acct of accounts){
          let cals; try{ cals=await gfetch("https://www.googleapis.com/calendar/v3/users/me/calendarList?minAccessRole=reader", acct.token); }catch(e){ continue; }
          for(const c of (cals.items||[])){
            if(c.selected===false) continue;
            let data; try{ data=await gfetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(c.id)}/events?singleEvents=true&orderBy=startTime&timeMin=${s.toISOString()}&timeMax=${e.toISOString()}`, acct.token); }catch(e){ continue; }
            (data.items||[]).forEach(x=>out.push({account:acct.email,calendarId:c.id,calendar:c.summary,eventId:x.id,summary:x.summary,start:x.start.dateTime||x.start.date,end:(x.end&&(x.end.dateTime||x.end.date))||null,allDay:!x.start.dateTime,location:x.location||null,canEdit:(c.accessRole==="owner"||c.accessRole==="writer")}));
          }
        }
        out.sort((p,q)=>new Date(p.start)-new Date(q.start));
        return out;
      }
      case "delete_event": {
        const acct=a.account?acctByEmail(a.account):accounts[0]; if(!acct) return {error:"unknown account "+a.account};
        if(!a.calendarId||!a.eventId) return {error:"need calendarId and eventId (get them from list_events)"};
        if(!confirm(`Delete this event from ${acct.email}?\n\n${a.summary||a.eventId}`)) return {cancelled:true,note:"User declined — do not retry."};
        const r=await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(a.calendarId)}/events/${encodeURIComponent(a.eventId)}`,{method:"DELETE",headers:{Authorization:"Bearer "+acct.token}});
        loadAgenda(); return (r.ok||r.status===204||r.status===200)?{deleted:true}:{error:"delete failed "+r.status+" — some calendars (e.g. Birthdays) are read-only and can't be edited"};
      }
      default: return {error:"unknown tool "+name};
    }
  }catch(err){ if(err.message==="expired") return {error:"Google session expired — click Connect Google again."}; return {error:String(err.message||err)}; }
}

/* ---------- Notes (synced to the Worker's KV; localStorage is the offline cache) ---------- */
const NOTES_URL = CONFIG.chatEndpoint ? CONFIG.chatEndpoint.replace(/\/+$/,"")+"/notes" : "";
function notesHeaders(extra){ return extra||{}; }   // notes are open (no auth) for now
function getNotes(){ try{ return localStorage.getItem("midash_notes")||""; }catch(e){ return ""; } }    // local cache
function cacheNotes(v){ try{ localStorage.setItem("midash_notes",v); }catch(e){} }

async function fetchNotes(){   // {notes} on success, else {error, status}
  if(!NOTES_URL) return {error:"none"};
  try{
    const r=await fetch(NOTES_URL,{headers:notesHeaders()});
    if(r.status===401) return {error:"key", status:401};
    if(r.status===404||r.status===405) return {error:"route", status:r.status};   // worker not redeployed with /notes
    if(r.status===501) return {error:"kv", status:501};                            // KV namespace not bound
    if(!r.ok) return {error:"http", status:r.status};
    const d=await r.json(); return {notes:typeof d.notes==="string"?d.notes:""};
  }catch(e){ return {error:"net"}; }
}
async function pushNotes(text){
  if(!NOTES_URL) return false;
  try{ const r=await fetch(NOTES_URL,{method:"PUT",headers:notesHeaders({"Content-Type":"text/plain"}),body:text}); return r.ok; }
  catch(e){ return false; }
}

function initNotes(){
  const ta=document.getElementById("notes-area"), st=document.getElementById("notes-status");
  const sync=document.getElementById("notes-sync");
  if(sync) sync.style.display="none";   // notes are open for now — no key needed
  ta.value=getNotes();   // show cached immediately
  const SYNC_MSG={ route:"sync off — redeploy Worker", kv:"add KV namespace (README)", net:"offline (local)", http:"sync error" };
  async function loadNotesRemote(){
    if(!NOTES_URL) return;
    st.textContent="syncing…";
    const res=await fetchNotes();
    if(res.error){ st.textContent=SYNC_MSG[res.error]||"offline (local)"; st.title=res.status?("HTTP "+res.status):""; return; }
    ta.value=res.notes; cacheNotes(res.notes); st.textContent="synced"; st.title="";
  }
  loadNotesRemote();

  let t=null;
  ta.addEventListener("input",()=>{
    st.textContent="saving…"; cacheNotes(ta.value);
    clearTimeout(t); t=setTimeout(async()=>{
      const ok=await pushNotes(ta.value);
      st.textContent = NOTES_URL ? (ok?"synced":"saved locally (sync failed)") : "saved";
    },500);
  });
}

/* ---------- Version stamp ----------
   Bold version; the segment(s) that changed since you last saw a new build are
   highlighted in the accent color, so it's obvious what moved. */
function versionHTML(){
  const cur=String(CONFIG.version||"?");
  let prev=null;
  try{
    const lastCur=localStorage.getItem("midash_ver_cur");
    if(lastCur!==cur){ prev=lastCur; localStorage.setItem("midash_ver_prev", lastCur||""); localStorage.setItem("midash_ver_cur", cur); }
    else prev=localStorage.getItem("midash_ver_prev");
  }catch(e){}
  const cs=cur.split("."), ps=prev?prev.split("."):null;
  const body=cs.map((seg,i)=>(ps && ps[i]!==undefined && ps[i]!==seg)?`<span class="vchg">${seg}</span>`:seg).join(".");
  return "v"+body;
}
function showVersion(){
  document.querySelectorAll(".ver").forEach(el=>{ el.innerHTML=versionHTML(); el.title="miDash version "+(CONFIG.version||""); });
}

loadAliases(); loadAcctColors(); render(); tick(); setInterval(tick,10000); initModelPicker(); initChat(); initNotes(); showVersion(); googleBoot();
